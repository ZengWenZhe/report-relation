#server
server.port = 8610
spring.profiles.active=test
spring.application.name=report-relation

project.name=cwork

logging.level.root=info
logging.level.com.xgjktech=debug
logging.level.com.alibaba.nacos=info

spring.cloud.nacos.username=cwork
spring.cloud.nacos.password=cwork@123
spring.cloud.nacos.server-addr=192.168.3.31:8848
#spring.datasource.dbname = cwork_report_relation

spring.cloud.nacos.config.namespace=${project.name}-${spring.profiles.active}
spring.cloud.nacos.discovery.namespace=${project.name}-${spring.profiles.active}

knife4j.enable=true

spring.cloud.nacos.config.shared-configs[0].data-id=common.properties
spring.cloud.nacos.config.shared-configs[0].refresh=true
spring.cloud.nacos.config.shared-configs[0].group=common

spring.cloud.nacos.config.shared-configs[1].data-id=common-mysql.properties
spring.cloud.nacos.config.shared-configs[1].refresh=true
spring.cloud.nacos.config.shared-configs[1].group=common

spring.cloud.nacos.config.shared-configs[2].data-id=common-redis.properties
spring.cloud.nacos.config.shared-configs[2].refresh=true
spring.cloud.nacos.config.shared-configs[2].group=common

spring.cloud.nacos.config.shared-configs[3].data-id=common-rabbitmq.properties
spring.cloud.nacos.config.shared-configs[3].refresh=true
spring.cloud.nacos.config.shared-configs[3].group=common

spring.jackson.time-zone=GMT+8

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
